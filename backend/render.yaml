services:
  - type: web
    name: belgaonkar-fitness-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: belgaonkar_fitness_prod
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
